name: Build and Push Docker Image

on:
  workflow_call:
    inputs:
      tag:
        required: true
        type: string
  workflow_dispatch:


permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v6
      with:
        ref: ${{ inputs.tag || github.ref}}

    - name: Prepare Docker Image Tag Variables
      id: vars
      run: |
        echo "Input Tag is: ${{ inputs.tag }}"
        echo "SHA_SHORT=$(git rev-parse --short=7 HEAD)" >> $GITHUB_ENV
        SELECTED_REF=${{ inputs.tag }}
        if [ -z "$SELECTED_REF" ]; then
          SELECTED_REF=${{ github.ref_name }}
        fi

        CLEAN_NAME=$(echo $SELECTED_REF | sed 's/[^a-zA-Z0-9.-]/-/g' | tr '[:upper:]' '[:lower:]')
        echo "CLEAN_REF=${CLEAN_NAME}" >> $GITHUB_ENV

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.repository_owner }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract Docker metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}
        tags: |
          type=raw,value=${{ env.CLEAN_REF }}-${{ env.SHA_SHORT }}
        flavor: |
          latest=false

    - name: Build and Push
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
